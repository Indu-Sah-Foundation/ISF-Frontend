
name: Deploy frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    # On a PR this builds + deploys to an isolated SWA PREVIEW URL.
    # On push to main it builds + deploys to PRODUCTION (the live site).
    name: ${{ github.event_name == 'push' && 'Build & deploy to production' || 'Build & deploy PR preview' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_ISF_API: ${{ secrets.BACKEND_URL }}
          VITE_ISF_API_KEY: ${{ secrets.VITE_ISF_API_KEY }}
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.VITE_APPINSIGHTS_CONNECTION_STRING }}
        run: |
          if [ -z "$VITE_ISF_API" ]; then
            echo "::error::VITE_ISF_API is not set. Add it as a GitHub Actions repo variable."
            exit 1
          fi
          npm run build

      # TanStack Start's `spa: { enabled: true }` mode (set in
      # vite.config.ts) prerenders the SPA shell as `_shell.html`.
      # SWA expects `index.html`, so we rename. Also drop a SWA config
      # that falls back to index.html for any unknown URL so client-side
      # routing works for deep links like /stories/<slug>.
      - name: Prepare dist for SWA
        run: |
          if [ ! -f dist/client/_shell.html ]; then
            echo "::error::dist/client/_shell.html not found — vite SPA mode didn't run. Check vite.config.ts."
            exit 1
          fi
          mv dist/client/_shell.html dist/client/index.html
          cat > dist/client/staticwebapp.config.json <<'JSON'
          {
            "navigationFallback": {
              "rewrite": "/index.html",
              "exclude": ["/assets/*", "/certificates/*", "*.{png,jpg,jpeg,gif,svg,ico,webp,css,js,json,txt,xml}"]
            }
          }
          JSON
          echo "Prepared SWA artifact:"
          ls -la dist/client/index.html dist/client/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "dist/client"
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_api_build: true

  # PR closed → tear down the per-PR preview environment SWA spun up.
  close_pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Tear down PR preview
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
